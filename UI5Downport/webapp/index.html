<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Annotation-Driven SAPUI5 Application</title>
	<script
		id="sap-ui-bootstrap"
		src="https://ui5.sap.com/1.120.30/resources/sap-ui-core.js"
		data-sap-ui-theme="sap_horizon"
		data-sap-ui-libs="sap.m,sap.ui.mdc"
		data-sap-ui-compat-version="edge"
		data-sap-ui-async="true"
		data-sap-ui-flexibility-services='[{"connector":"SessionStorageConnector"}]'
		data-sap-ui-resource-roots='{"downport": "./"}'
		data-sap-ui-on-init="module:sap/ui/core/ComponentSupport">
	</script>
</head>
<body class="sapUiBody" id="content">
	<div data-sap-ui-component
		data-name="downport"
		data-manifest="true"
		data-height="100%"
		data-settings='{"id":"downport"}'></div>
</body>
</html>
